name: CI

# Runs on every push to main and every PR against main.
# Customize the test command if your project uses something other than `npm test`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        # Remove or swap for your linter of choice. Biome shown here; eslint
        # would be `npx eslint .`, prettier `npx prettier --check .`.
        run: npx biome check src/ test/
        continue-on-error: false

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
