name: Release

on:
  push:
    branches: [main, dev]
    paths: [package.json]

jobs:
  release:
    name: Tag + Publish + GitHub Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: version
        run: |
          NEW=$(node -p "require('./package.json').version")
          OLD=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync(0,'utf-8')).version" 2>/dev/null || echo "")
          if [ "$NEW" = "$OLD" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$NEW" >> $GITHUB_OUTPUT
            echo "tag=v$NEW" >> $GITHUB_OUTPUT
            if echo "$NEW" | grep -q -- "-"; then
              echo "prerelease=--prerelease" >> $GITHUB_OUTPUT
            else
              echo "prerelease=" >> $GITHUB_OUTPUT
            fi
            if echo "$NEW" | grep -q "alpha"; then
              echo "npm_tag=alpha" >> $GITHUB_OUTPUT
            elif echo "$NEW" | grep -q "beta"; then
              echo "npm_tag=beta" >> $GITHUB_OUTPUT
            elif echo "$NEW" | grep -q "rc"; then
              echo "npm_tag=rc" >> $GITHUB_OUTPUT
            else
              echo "npm_tag=latest" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Stop if version unchanged
        if: steps.version.outputs.changed == 'false'
        run: echo "Version unchanged, skipping release." && exit 0

      - name: Setup Node.js
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install, lint, build, test
        if: steps.version.outputs.changed == 'true'
        run: |
          npm ci
          npx biome check src/ test/
          npm run build
          npm test

      - name: Publish to npm (trusted publishing via OIDC)
        if: steps.version.outputs.changed == 'true'
        run: npm publish --tag ${{ steps.version.outputs.npm_tag }}

      - name: Create git tag
        if: steps.version.outputs.changed == 'true'
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        run: gh release create ${{ steps.version.outputs.tag }} --generate-notes ${{ steps.version.outputs.prerelease }}
        env:
          GH_TOKEN: ${{ github.token }}
