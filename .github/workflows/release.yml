name: Release

on:
  push:
    branches: [main]
    paths: [package.json]

jobs:
  release:
    name: Tag + GitHub Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: version
        run: |
          NEW=$(node -p "require('./package.json').version")
          OLD=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync(0,'utf-8')).version" 2>/dev/null || echo "")
          if [ "$NEW" = "$OLD" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$NEW" >> $GITHUB_OUTPUT
            echo "tag=v$NEW" >> $GITHUB_OUTPUT
            if echo "$NEW" | grep -q -- "-"; then
              echo "prerelease=--prerelease" >> $GITHUB_OUTPUT
            else
              echo "prerelease=" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Stop if version unchanged
        if: steps.version.outputs.changed == 'false'
        run: echo "Version unchanged, skipping release." && exit 0

      - name: Setup Node.js
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install, lint, build, test
        if: steps.version.outputs.changed == 'true'
        run: |
          npm ci
          npx biome check src/ test/
          npm run build
          npm test

      - name: Create git tag
        if: steps.version.outputs.changed == 'true'
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        run: gh release create ${{ steps.version.outputs.tag }} --generate-notes ${{ steps.version.outputs.prerelease }}
        env:
          GH_TOKEN: ${{ github.token }}

      # TODO: uncomment when NPM_TOKEN secret is configured
